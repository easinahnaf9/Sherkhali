<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শেরখালী যুবশক্তি</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #ecf0f3; --shadow-dark: #d1d9e6; --shadow-light: #ffffff; --accent-color: #31344b; --blood-red: #e74c3c; }
        .dark-mode { --bg-color: #2d3436; --shadow-dark: #1e2425; --shadow-light: #3c4446; --accent-color: #ecf0f3; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--accent-color); transition: 0.3s; overflow-x: hidden; }

        /* Header */
        header { position: fixed; top: 0; width: 100%; height: 70px; background: var(--bg-color); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; box-shadow: 5px 5px 10px var(--shadow-dark); }
        header h1 { font-size: 22px; font-weight: 700; flex: 1; text-align: left; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg-color); cursor: pointer; color: var(--accent-color); }

        /* Side Nav */
        .side-nav { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--bg-color); z-index: 6000; padding: 50px 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.4s; }
        .side-nav.active { right: 0; }
        .menu-item { padding: 15px; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); cursor: pointer; font-weight: 600; }

        /* Fixed Search Area */
        .search-container { position: fixed; top: 70px; width: 100%; padding: 15px; background: var(--bg-color); z-index: 900; }
        .search-box { width: 100%; padding: 15px 25px; border: none; border-radius: 30px; background: var(--bg-color); box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light); outline: none; font-size: 16px; color: var(--accent-color); }

        /* Main Content */
        main { padding: 155px 15px 100px; min-height: 100vh; }
        .page-section { display: none; }
        .active-section { display: block; }

        /* Footer */
        footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg-color); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 20px var(--shadow-dark); z-index: 1000; border-radius: 30px 30px 0 0; }
        .nav-item { text-align: center; color: #888; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item i { font-size: 24px; }

        /* List UI */
        .list-item { background: var(--bg-color); padding: 15px; border-radius: 20px; margin-bottom: 18px; display: flex; align-items: center; box-shadow: 7px 7px 14px var(--shadow-dark), -7px -7px 14px var(--shadow-light); cursor: pointer; }
        .list-item img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; box-shadow: 3px 3px 6px var(--shadow-dark); }
        .list-item .info { flex: 1; margin-left: 15px; }
        .list-item .name { font-weight: 700; font-size: 18px; }

        /* Blood Grid */
        .blood-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .blood-card { background: var(--bg-color); padding: 25px; border-radius: 25px; text-align: center; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); cursor: pointer; }
        .blood-card h3 { color: var(--blood-red); font-size: 26px; }

        /* Overlay Styling */
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: none; overflow-y: auto; padding: 40px 20px; }
        #profileOverlay { z-index: 5500; } /* প্রোফাইল সবার উপরে থাকবে */
        #bloodOverlay { z-index: 5000; }
        #devOverlay { z-index: 5800; }

        .neumorphic-card { background: var(--bg-color); border-radius: 50px; padding: 40px 20px; box-shadow: 20px 20px 40px var(--shadow-dark), -20px -20px 40px var(--shadow-light); text-align: center; max-width: 380px; margin: 20px auto; }
        
        .profile-img-box { width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 30px; padding: 10px; background: var(--bg-color); box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); display: flex; align-items: center; justify-content: center; }
        .profile-img-box img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        
        .user-name { font-size: 28px; font-weight: 800; color: #31344b; margin-bottom: 5px; }
        .user-father { color: #777; font-size: 16px; margin-bottom: 30px; }
        
        .social-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 35px; }
        .social-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg-color); box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); color: var(--accent-color); text-decoration: none; font-size: 20px; }
        
        .action-btns { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .btn-n { flex: 1; padding: 16px; border-radius: 18px; border: none; background: var(--bg-color); color: var(--accent-color); font-weight: 700; box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); cursor: pointer; text-decoration: none; font-size: 15px; text-align: center; }

        .stats-row { display: flex; justify-content: space-around; padding-top: 25px; border-top: 1px solid rgba(0,0,0,0.05); }
        .stat-item { text-align: center; }
        .stat-item i { display: block; font-size: 20px; margin-bottom: 8px; color: #777; }
        .stat-item span { font-weight: 700; font-size: 14px; }
        .stat-item .blood-icon { color: var(--blood-red); }

        .form-card { background: var(--bg-color); padding: 25px; border-radius: 30px; box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light); }
        .input-f { width: 100%; padding: 15px 20px; border: none; border-radius: 20px; background: var(--bg-color); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); outline: none; margin-bottom: 15px; font-size: 15px; color: var(--accent-color); }
    </style>
</head>
<body>

<header>
    <h1>শেরখালী যুবশক্তি</h1>
    <div class="icon-btn" id="menuBtn"><i class="fas fa-ellipsis-v"></i></div>
</header>

<div id="sideNav" class="side-nav">
    <div class="menu-item" onclick="toggleDarkMode()"><i class="fas fa-moon"></i> ডার্ক মোড</div>
    <div class="menu-item" onclick="showDev()"><i class="fas fa-code"></i> ডেভেলপার</div>
    <div class="menu-item" onclick="closeMenu()"><i class="fas fa-times"></i> বন্ধ করুন</div>
</div>

<div class="search-container" id="searchArea">
    <input type="text" id="searchInput" class="search-box" placeholder="নাম অথবা ফোন দিয়ে খুঁজুন...">
</div>

<main>
    <div id="homeSec" class="page-section active-section">
        <div id="loader" style="text-align: center; padding: 40px;">ডাটা লোড হচ্ছে...</div>
        <div id="mainList"></div>
    </div>

    <div id="bloodSec" class="page-section">
        <div class="blood-grid" id="bloodSummary"></div>
    </div>

    <div id="addSec" class="page-section">
        <div class="form-card">
            <h2 style="text-align:center; margin-bottom:20px;">নতুন সদস্য</h2>
            <div style="text-align:center; margin-bottom:20px;">
                <div class="profile-img-box" style="width:110px; height:110px; cursor:pointer;" onclick="document.getElementById('imgInput').click()">
                    <img id="previewImg" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                </div>
                <input type="file" id="imgInput" hidden accept="image/*">
            </div>
            <input type="text" id="m_name" class="input-f" placeholder="নাম">
            <input type="text" id="m_father" class="input-f" placeholder="পিতার নাম">
            <select id="m_blood" class="input-f">
                <option value="-">রক্তের গ্রুপ</option>
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="O+">O+</option><option value="O-">O-</option>
                <option value="AB+">AB+</option><option value="AB-">AB-</option>
            </select>
            <input type="number" id="m_phone" class="input-f" placeholder="ফোন নম্বর">
            <input type="text" id="m_fb" class="input-f" placeholder="ফেসবুক লিঙ্ক">
            <button id="saveBtn" class="btn-n" style="width:100%; background:var(--blood-red); color:white;">সেভ করুন</button>
        </div>
    </div>
</main>

<!-- Overlays -->
<div id="profileOverlay" class="full-overlay"></div>
<div id="bloodOverlay" class="full-overlay">
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
        <div class="icon-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></div>
        <h2 id="bTitle">তালিকা</h2>
    </div>
    <div id="bloodList"></div>
</div>
<div id="devOverlay" class="full-overlay"></div>

<footer>
    <div class="nav-item active" onclick="navTo('homeSec', this)"><i class="fas fa-home"></i></div>
    <div class="nav-item" onclick="navTo('addSec', this)"><i class="fas fa-plus-circle"></i></div>
    <div class="nav-item" onclick="navTo('bloodSec', this)"><i class="fas fa-tint"></i></div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC8Ppk7UKPGfGw4I6n00I8e79xkb4_lHcA",
        authDomain: "sherkhali.firebaseapp.com",
        projectId: "sherkhali",
        storageBucket: "sherkhali.firebasestorage.app",
        messagingSenderId: "1016738622293",
        appId: "1:1016738622293:web:b01e8f705aacc4dbc05ddc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const IMGBB_KEY = "7a5eacf017aadcfeb81ef6f990a570a6";

    window.allMembers = [];

    onSnapshot(query(collection(db, "members"), orderBy("name", "asc")), (snap) => {
        window.allMembers = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        renderList(window.allMembers, 'mainList');
        document.getElementById('loader').style.display = 'none';
    });

    document.getElementById('saveBtn').onclick = async () => {
        const file = document.getElementById('imgInput').files[0];
        const name = document.getElementById('m_name').value;
        const phone = document.getElementById('m_phone').value;
        const btn = document.getElementById('saveBtn');

        if(!name || !phone) return alert("নাম এবং নম্বর দিন!");
        btn.disabled = true; btn.innerText = "আপলোড হচ্ছে...";

        try {
            let imgUrl = "";
            if(file) {
                let fd = new FormData(); fd.append("image", file);
                let res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
                let d = await res.json(); imgUrl = d.data.url;
            }
            await addDoc(collection(db, "members"), {
                name, phone, img: imgUrl, 
                father: document.getElementById('m_father').value,
                blood: document.getElementById('m_blood').value,
                fb: document.getElementById('m_fb').value || "#"
            });
            alert("সফল হয়েছে!"); location.reload();
        } catch(e) { alert("ত্রুটি!"); btn.disabled = false; btn.innerText = "সেভ করুন"; }
    };
</script>

<script>
    function navTo(id, el) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('searchArea').style.display = (id === 'addSec') ? 'none' : 'block';
        if(id === 'bloodSec') renderBloodGrid();
        window.history.pushState({sec: id}, "");
    }

    function renderList(data, targetId) {
        const target = document.getElementById(targetId);
        target.innerHTML = '';
        data.forEach(m => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.onclick = () => openProfile(m);
            const img = m.img || `https://ui-avatars.com/api/?name=${m.name}&background=random`;
            div.innerHTML = `<img src="${img}"><div class="info"><div class="name">${m.name}</div><div style="font-size:13px; color:var(--blood-red); font-weight:700;">${m.blood} Group</div></div>`;
            target.appendChild(div);
        });
    }

    function openProfile(m) {
        const overlay = document.getElementById('profileOverlay');
        const img = m.img || `https://ui-avatars.com/api/?name=${m.name}&background=random`;
        overlay.innerHTML = `
            <div class="neumorphic-card">
                <div class="profile-img-box"><img src="${img}"></div>
                <div class="user-name">${m.name}</div>
                <div class="user-father">পিতা: ${m.father}</div>
                <div class="social-row">
                    <a href="tel:${m.phone}" class="social-btn"><i class="fas fa-phone"></i></a>
                    <a href="${m.fb}" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://wa.me/88${m.phone}" target="_blank" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                    
                </div>
                <div class="action-btns">
                    <a href="sms:${m.phone}" class="btn-n">Message</a>
                    <a href="tel:${m.phone}" class="btn-n">Call Now</a>
                </div>
                <div class="stats-row">
                    <div class="stat-item"><i class="fas fa-tint blood-icon"></i><span>${m.blood}</span></div>
                    <div class="stat-item"><i class="fas fa-map-marker-alt"></i><span>শেরখালী</span></div>
                    <div class="stat-item"><i class="fas fa-check-circle"></i><span>Active</span></div>
                </div>
                <p style="margin-top:30px; font-size:12px; color:#aaa;">(ফিরে যেতে ফোনের ব্যাক বাটন চাপুন)</p>
            </div>
        `;
        overlay.style.display = 'block';
        window.history.pushState({view: 'profile'}, "");
    }

    function renderBloodGrid() {
        const groups = ["A+", "A-", "B+", "B-", "O+", "O-", "AB+", "AB-"];
        const grid = document.getElementById('bloodSummary');
        grid.innerHTML = '';
        groups.forEach(g => {
            const count = window.allMembers.filter(m => m.blood === g).length;
            const div = document.createElement('div');
            div.className = 'blood-card';
            div.onclick = () => {
                document.getElementById('bTitle').innerText = g + " গ্রুপ ("+count+")";
                renderList(window.allMembers.filter(m => m.blood === g), 'bloodList');
                document.getElementById('bloodOverlay').style.display = 'block';
                window.history.pushState({view: 'bloodDetails'}, "");
            };
            div.innerHTML = `<h3>${g}</h3><p>${count} জন দাতা</p>`;
            grid.appendChild(div);
        });
    }

    document.getElementById('menuBtn').onclick = () => document.getElementById('sideNav').classList.add('active');
    function closeMenu() { document.getElementById('sideNav').classList.remove('active'); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); closeMenu(); }
    
    function showDev() {
        const dev = document.getElementById('devOverlay');
        dev.innerHTML = `<div class="neumorphic-card">
            <div class="profile-img-box"><img src="https://raw.githubusercontent.com/easinahnaf9/Easin/main/easin.png"></div>
            <div class="user-name">মো: ইয়াসিন আহনাফ</div>
            <p class="user-father">Web Developer</p>
            <div class="social-row"><a href="https://facebook.com/easinahnaf9" class="social-btn"><i class="fab fa-facebook-f"></i></a><a href="https://wa.me/8801731866973" class="social-btn"><i class="fab fa-whatsapp"></i></a></div>
            <button onclick="window.history.back()" class="btn-n" style="width:100%; margin-top:20px;">ফিরে যান</button>
        </div>`;
        dev.style.display = 'block'; closeMenu(); window.history.pushState({view:'dev'},"");
    }

    document.getElementById('searchInput').onkeyup = function() {
        const term = this.value.toLowerCase();
        renderList(window.allMembers.filter(m => m.name.toLowerCase().includes(term) || m.phone.includes(term)), 'mainList');
    };

    document.getElementById('imgInput').onchange = (e) => {
        if(e.target.files[0]) document.getElementById('previewImg').src = URL.createObjectURL(e.target.files[0]);
    };

    // ব্যাক বাটন লজিক - লেয়ার অনুযায়ী বন্ধ হবে
    window.onpopstate = (e) => {
        const profile = document.getElementById('profileOverlay');
        const blood = document.getElementById('bloodOverlay');
        const dev = document.getElementById('devOverlay');

        if (profile.style.display === 'block') {
            profile.style.display = 'none';
        } else if (blood.style.display === 'block') {
            blood.style.display = 'none';
        } else if (dev.style.display === 'block') {
            dev.style.display = 'none';
        } else if (e.state && e.state.sec) {
            navTo(e.state.sec, document.querySelector(`[onclick*="${e.state.sec}"]`));
        } else {
            navTo('homeSec', document.querySelector('[onclick*="homeSec"]'));
        }
    };
</script>

</body>
</html>
