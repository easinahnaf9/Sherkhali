    <style>
        :root {
            --bg-color: #ecf0f3;
            --shadow-dark: #d1d9e6;
            --shadow-light: #ffffff;
            --accent-color: #31344b;
            --text-gray: #777;
            --blood-red: #e74c3c;
        }

        .dark-mode {
            --bg-color: #2d3436;
            --shadow-dark: #1e2425;
            --shadow-light: #3c4446;
            --accent-color: #ecf0f3;
            --text-gray: #bdc3c7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg-color);
            color: var(--accent-color);
            transition: 0.3s;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .phone-container { width: 100%; max-width: 450px; position: relative; padding-bottom: 90px; overflow-x: hidden; }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 30px 20px 10px; }
        .top-bar h1 { font-size: 24px; font-weight: 700; flex-grow: 1; text-align: center; margin-left: 40px;}
        .menu-dot {
            width: 45px; height: 45px; border-radius: 50%; background: var(--bg-color);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            cursor: pointer; font-size: 20px;
        }

        /* Side Nav */
        .side-nav {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--bg-color); z-index: 3000; padding: 50px 20px;
            box-shadow: -10px 0 30px var(--shadow-dark); transition: 0.4s ease;
        }
        .side-nav.active { right: 0; }
        .side-nav .menu-item {
            padding: 15px; margin-bottom: 20px; border-radius: 12px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            cursor: pointer; font-weight: 600;
        }

        /* Member List Neumorphic Items */
        .list-container { padding: 15px; }
        .list-item {
            background: var(--bg-color); padding: 15px; border-radius: 20px;
            margin-bottom: 20px; display: flex; align-items: center;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            cursor: pointer; transition: 0.2s;
        }
        .list-item:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .list-item img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; box-shadow: 3px 3px 6px var(--shadow-dark); }
        .list-item .info { flex-grow: 1; margin-left: 15px; }
        .list-item .name { font-size: 17px; font-weight: 600; }

        /* Overlays (Profile & Dev) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 4000; display: none;
            align-items: center; justify-content: center;
        }

        /* বড় এবং লম্বা কার্ড ডিজাইন (এখানে পরিবর্তন করা হয়েছে) */
        .neumorphic-card {
            width: 92%; max-width: 360px; /* চওড়া বাড়ানো হয়েছে */
            background: var(--bg-color);
            padding: 50px 25px 40px; /* লম্বা করার জন্য প্যাডিং বাড়ানো হয়েছে */
            border-radius: 50px;
            box-shadow: 15px 15px 35px var(--shadow-dark), -15px -15px 35px var(--shadow-light);
            text-align: center;
        }

        /* বড় প্রোফাইল ইমেজ */
        .profile-img-box {
            width: 150px; height: 150px; /* সাইজ বাড়ানো হয়েছে */
            margin: 0 auto 25px; border-radius: 50%; padding: 10px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            display: flex; align-items: center; justify-content: center;
        }
        .profile-img-box img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }

        .user-name { font-size: 26px; color: var(--accent-color); font-weight: 700; margin-bottom: 8px; }
        .user-father { font-size: 16px; color: var(--text-gray); margin-bottom: 35px; }

        /* বড় সোশ্যাল বাটন */
        .social-row { display: flex; justify-content: center; gap: 18px; margin-bottom: 35px; }
        .social-btn {
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: var(--bg-color); color: var(--accent-color);
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            font-size: 20px; text-decoration: none;
        }

        /* বড় অ্যাকশন বাটন */
        .action-btns { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .btn {
            width: 135px; padding: 14px; border-radius: 15px; border: none;
            background: var(--bg-color); color: var(--accent-color); font-weight: 600;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            text-decoration: none; font-size: 15px; text-align: center;
        }
        .btn:active { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }

        /* স্ট্যাটাস লাইন */
        .stats-row { 
            display: flex; justify-content: space-around; 
            border-top: 1px solid rgba(0,0,0,0.05); padding-top: 25px; 
            margin-top: 10px;
        }
        .stat-item i { display: block; font-size: 18px; color: var(--text-gray); margin-bottom: 8px; }
        .stat-item span { display: block; font-weight: bold; font-size: 15px; }

        /* Search Box */
        .search-box {
            width: 90%; margin: 10px auto 20px; display: block;
            padding: 16px 20px; border: none; border-radius: 30px;
            background: var(--bg-color); color: var(--accent-color);
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            outline: none; font-family: 'Hind Siliguri'; font-size: 16px;
        }

        /* Blood Summary Card */
        .blood-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .blood-card {
            background: var(--bg-color); padding: 22px; border-radius: 22px;
            text-align: center; cursor: pointer;
            box-shadow: 7px 7px 14px var(--shadow-dark), -7px -7px 14px var(--shadow-light);
            transition: 0.2s;
        }
        .blood-card h3 { color: var(--blood-red); font-size: 24px; margin-bottom: 5px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 450px;
            background: var(--bg-color); display: flex; justify-content: space-around;
            padding: 18px 0; border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 20px var(--shadow-dark); z-index: 1000;
        }
        .nav-item { color: #888; font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); }
        .page-section { display: none; }
        .active-section { display: block; }
/* প্রোফাইলের ভেতরের ব্লাড আইকন লাল করার জন্য */
.stat-item i.fa-tint {
    color: #e74c3c !important;
}

                <div class="stat-item"><i class="fas fa-map-marker-alt"></i> <span>শেরখালী</span></div>
                <div class="stat-item"><i class="fas fa-check-circle"></i> <span>Active</span></div>
            </div>
            <p style="margin-top:25px; font-size:11px; color:#aaa;">(ফিরে যেতে ফোনের ব্যাক বাটন চাপুন)</p>
        `;
        document.getElementById('profileOverlay').style.display = 'flex';
        window.history.pushState({view: 'profile'}, '');
    }

    function renderBloodStats() {
        const groups = ["A+", "A-", "B+", "B-", "O+", "O-", "AB+", "AB-"];
        const grid = document.getElementById('bloodSummary');
        grid.innerHTML = '';
        groups.forEach(g => {
            const count = members.filter(m => m.blood === g).length;
            const card = document.createElement('div');
            card.className = 'blood-card';
            card.onclick = () => {
                const filtered = members.filter(m => m.blood === g);
                document.getElementById('bloodTitle').innerText = g + " গ্রুপের তালিকা (" + count + " জন)";
                renderList(filtered, 'bloodFilteredList');
            };
            card.innerHTML = `<h3>${g}</h3><p>${count} জন</p>`;
            grid.appendChild(card);
        });
        renderList(members, 'bloodFilteredList');
    }

    function toggleMenu() { document.getElementById('sideNav').classList.toggle('active'); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); toggleMenu(); }
    function showDeveloper() { document.getElementById('devOverlay').style.display = 'flex'; toggleMenu(); window.history.pushState({view: 'dev'}, '');}
    function closeDev() { document.getElementById('devOverlay').style.display = 'none'; }
    function showTab(id, el) { 
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'blood') renderBloodStats();
    }

    window.onpopstate = () => { 
        document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); 
    };

    function runSearch() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        renderList(members.filter(m => m.name.toLowerCase().includes(val)), 'searchList');
    }

    renderList(members, 'mainList');
</script>

</body>
</html>
